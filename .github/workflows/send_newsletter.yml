name: Daily AI & Notion News Mailer

on:
  schedule:
    # 8:00 AM JST is 23:00 UTC (previous day)
    - cron: '0 23 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  send-mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "antigravity作業用/ai_news_mailer/requirements.txt" ]; then
            pip install -r "antigravity作業用/ai_news_mailer/requirements.txt"
          else
            echo "Error: requirements.txt not found at antigravity作業用/ai_news_mailer/requirements.txt"
            exit 1
          fi

      - name: Run News Mailer script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_ADDRESS: ${{ secrets.RECIPIENT_ADDRESS }}
          SEARCH_LIMIT_DAYS: 3
        run: |
          cd "antigravity作業用/ai_news_mailer"
          python main.py
